<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Rainfall Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #060d1a;
      --surface: #0d1f35;
      --panel:   #0f2540;
      --border:  rgba(255,255,255,0.09);
      --accent:  #38bdf8;
      --accent2: #0ea5e9;
      --text:    #e2edf8;
      --muted:   rgba(226,237,248,0.42);
      --error:   #f87171;
      --font:    'Outfit', sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Ambient glow ───────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 18% 22%, rgba(56,189,248,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 82% 78%, rgba(14,165,233,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Rain drops ─────────────────────────────── */
    .rain { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .drop {
      position: absolute; top: -80px; width: 1px; border-radius: 1px;
      background: linear-gradient(to bottom, transparent, rgba(56,189,248,0.38));
      animation: fall linear infinite;
    }
    @keyframes fall { to { transform: translateY(110vh); } }

    /* ── Card ───────────────────────────────────── */
    .card {
      position: relative; z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 48px 42px 44px;
      width: 100%; max-width: 420px;
      margin: 20px;
      box-shadow: 0 32px 90px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: slideUp .55s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Logo ───────────────────────────────────── */
    .logo { text-align: center; margin-bottom: 34px; }
    .logo-icon {
      font-size: 3.2rem; display: block; line-height: 1;
      filter: drop-shadow(0 0 18px rgba(56,189,248,.55));
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 16px rgba(56,189,248,.5)); }
      50%      { filter: drop-shadow(0 0 30px rgba(56,189,248,.9)); }
    }
    .logo h1 {
      margin-top: 13px;
      font-size: 1.55rem; font-weight: 800; letter-spacing: -.4px;
    }
    .logo p { font-size: .78rem; color: var(--muted); margin-top: 5px; letter-spacing: .6px; }

    /* ── Fields ─────────────────────────────────── */
    .field { margin-bottom: 18px; }
    label {
      display: block; margin-bottom: 8px;
      font-size: .76rem; font-weight: 500;
      color: var(--muted); letter-spacing: .7px; text-transform: uppercase;
    }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 15px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text); font-family: var(--font); font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input:focus {
      border-color: var(--accent2);
      background: rgba(14,165,233,0.06);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.13);
    }
    input::placeholder { color: rgba(226,237,248,0.2); }

    /* ── Error ──────────────────────────────────── */
    .error {
      display: flex; align-items: center; gap: 9px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      color: #fca5a5; font-size: .84rem;
      padding: 10px 14px; margin-bottom: 18px;
    }

    /* ── Button ─────────────────────────────────── */
    .btn {
      width: 100%; padding: 14px; margin-top: 6px;
      background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
      border: none; border-radius: 12px;
      color: #fff; font-family: var(--font);
      font-size: 1rem; font-weight: 700; letter-spacing: .2px;
      cursor: pointer;
      box-shadow: 0 8px 26px rgba(14,165,233,0.38);
      transition: transform .15s, box-shadow .15s, filter .15s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(14,165,233,.52); filter: brightness(1.07); }
    .btn:active { transform: translateY(0); }

    /* ── Hint ───────────────────────────────────── */
    .hint { text-align: center; margin-top: 20px; font-size: .76rem; color: rgba(226,237,248,.22); }
  </style>
</head>
<body>

  <!-- Rain animation -->
  <div class="rain" id="rain"></div>

  <!-- Login card -->
  <div class="card">

    <div class="logo">
      <span class="logo-icon">🌧️</span>
      <h1>Rainfall Predictor</h1>
      <p>WEATHER INTELLIGENCE SYSTEM</p>
    </div>

    <!-- Show error message if login failed -->
    {% if error %}
      <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <!-- Login form — sends POST to /login -->
    <form method="POST" action="/login">

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username" required autocomplete="off"/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" required/>
      </div>

      <button type="submit" class="btn">Sign In →</button>
    </form>

    <p class="hint">Default credentials: admin / 1234</p>

  </div>

  <script>
    // Generate animated rain drops in the background
    const rain = document.getElementById('rain');
    for (let i = 0; i < 55; i++) {
      const d = document.createElement('div');
      d.className = 'drop';
      d.style.cssText = `
        left: ${Math.random() * 100}%;
        height: ${35 + Math.random() * 65}px;
        animation-duration: ${1.4 + Math.random() * 2.4}s;
        animation-delay: ${Math.random() * 5}s;
        opacity: ${0.2 + Math.random() * 0.45};
      `;
      rain.appendChild(d);
    }
  </script>

</body>
</html>
